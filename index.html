<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webcam Draw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Pickr (Modern Custom Color Picker) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="landmark-canvas"></canvas>
      <canvas id="drawing-canvas"></canvas>
    </div>
    
    <div id="toolbar-wrapper">
      <div id="controls" class="glass-panel">
        <div class="control-group">
          <div id="gesture-hint">
            <span class="hint-icon">✋</span> Palm = clear <span class="divider">|</span> <span class="hint-icon">🤙</span> Pinky = undo
          </div>
        </div>
        
        <div class="divider-vertical"></div>
        
        <div class="control-group" id="color-swatches">
          <button class="swatch active" data-color="#ff4d6d" style="background:#ff4d6d"></button>
          <button class="swatch" data-color="#ffd60a" style="background:#ffd60a"></button>
          <button class="swatch" data-color="#06d6a0" style="background:#06d6a0"></button>
          <button class="swatch" data-color="#4cc9f0" style="background:#4cc9f0"></button>
          <button class="swatch" data-color="#ffffff" style="background:#ffffff"></button>
          <div class="custom-color-wrapper" id="custom-color-container" title="Custom color">
            <div class="custom-color-icon">+</div>
          </div>
        </div>
        
        <div class="divider-vertical"></div>
        
        <div class="control-group">
          <label id="size-label">
            Size <span id="size-val">4</span>px
            <input type="range" id="brush-size" min="1" max="40" value="4" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Core modules loaded as ES modules -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
